name: turbo_template
description: "Ultra wide turbo flutter template"

version: 0.1.0

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  email_validator: ^3.0.0
  url_launcher: ^6.2.4
  cupertino_icons: ^1.0.8
  json_annotation: ^4.9.0
  veto: ^0.0.15
  loglytics: ^0.14.1
  get_it: ^7.7.0
  package_info_plus: ^8.1.2
  top_snackbar_flutter: ^3.1.0
  url_strategy: ^0.3.0
  firebase_auth: ^5.3.4
  hive: ^2.2.3
  firebase_core: ^3.9.0
  flutter_animate: ^4.5.2
  provider: ^6.1.2
  rxdart: ^0.28.0
  flutter_intl: ^0.0.1
  cloud_firestore: ^5.6.0
  informers: ^0.0.3+1
  go_router: ^14.6.2
  flutter_svg: ^2.0.16
  feedback_response: ^0.0.8
  collection: ^1.18.0
  gap: ^3.0.1
  auto_size_text: ^3.0.0
  connectivity_plus: ^6.1.1
  localstore: ^1.4.0
  flutter_secure_storage: ^9.0.0
  rive: ^0.13.20
  haptic_feedback: ^0.5.1+1
  firebase_storage: ^12.3.7
  cloud_functions: ^5.2.0
  cloud_firestore_api: ^0.0.11+6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/pngs/
    - assets/rive/
    - assets/svgs/
    - assets/audio/
    - assets/jpg/
    - assets/md/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Nunito-ExtraLightItalic.ttf
          weight: 200
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-LightItalic.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Italic.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-MediumItalic.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-SemiBoldItalic.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-BoldItalic.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-ExtraBoldItalic.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
        - asset: assets/fonts/Nunito-BlackItalic.ttf
          weight: 900

flutter_intl:
  arb_dir: lib/core/strings
  class_name: Strings
  enabled: true
  main_locale: en
  output_dir: lib/core/strings/gen
